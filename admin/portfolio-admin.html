<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QDM 포트폴리오 로컬 관리자</title>
  <style>
    :root {
      --ink: #172033;
      --muted: #667085;
      --line: #d8e0ec;
      --panel: #ffffff;
      --bg: #f3f6fb;
      --blue: #06306f;
      --blue2: #0b4fb3;
      --green: #0b7a53;
      --red: #b42318;
      --yellow: #a15c00;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
      color: var(--ink);
      background: var(--bg);
      line-height: 1.55;
    }
    button, input, textarea, select { font: inherit; }
    button { cursor: pointer; }
    .shell { min-height: 100vh; display: grid; grid-template-rows: auto 1fr; }
    header {
      background: #fff;
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 5;
    }
    .top {
      max-width: 1420px;
      margin: 0 auto;
      padding: 18px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
    }
    h1 { margin: 0; font-size: 22px; color: var(--blue); }
    .sub { margin: 3px 0 0; color: var(--muted); font-size: 13px; }
    .toolbar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 8px;
      min-height: 42px;
      padding: 0 15px;
      font-weight: 800;
    }
    .btn.primary { background: var(--blue); border-color: var(--blue); color: #fff; }
    .btn.green { background: var(--green); border-color: var(--green); color: #fff; }
    .btn.danger { color: var(--red); border-color: #f1b8b2; }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    main {
      max-width: 1420px;
      margin: 0 auto;
      width: 100%;
      padding: 22px 24px 42px;
      display: grid;
      grid-template-columns: 390px 1fr;
      gap: 22px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    .panel-head {
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .panel-title { font-size: 16px; font-weight: 900; }
    .panel-body { padding: 18px; }
    .status {
      padding: 11px 13px;
      border-radius: 8px;
      background: #eef4ff;
      border: 1px solid #c7d7fe;
      color: #1d3b7a;
      font-size: 13px;
      font-weight: 700;
    }
    .status.warn { background: #fff7ed; border-color: #fed7aa; color: var(--yellow); }
    .status.good { background: #ecfdf3; border-color: #abefc6; color: var(--green); }
    .status.bad { background: #fef3f2; border-color: #fecdca; color: var(--red); }
    .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
    .chip {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 999px;
      padding: 7px 11px;
      font-size: 12px;
      font-weight: 900;
    }
    .chip.active { background: var(--blue); color: #fff; border-color: var(--blue); }
    .portfolio-list { display: grid; gap: 10px; max-height: calc(100vh - 280px); overflow: auto; padding-right: 4px; }
    .item {
      width: 100%;
      text-align: left;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 8px;
      padding: 12px;
    }
    .item.active { border-color: var(--blue2); box-shadow: 0 0 0 3px rgba(11,79,179,.12); }
    .item-top { display: flex; justify-content: space-between; gap: 10px; align-items: start; }
    .item-title { font-weight: 900; line-height: 1.35; }
    .item-meta { color: var(--muted); font-size: 12px; margin-top: 6px; }
    .featured { color: var(--green); font-weight: 900; white-space: nowrap; font-size: 12px; }
    form { display: grid; gap: 18px; }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
    .grid.three { grid-template-columns: 1.3fr .8fr .7fr; }
    label { display: grid; gap: 7px; font-size: 13px; font-weight: 900; }
    input, textarea, select {
      width: 100%;
      border: 1px solid #cfd8e6;
      border-radius: 8px;
      padding: 11px 12px;
      background: #fff;
      color: var(--ink);
    }
    textarea { min-height: 104px; resize: vertical; }
    .hint { color: var(--muted); font-size: 12px; font-weight: 600; }
    .check-row { display: flex; gap: 10px; align-items: center; font-size: 14px; font-weight: 900; }
    .check-row input { width: 18px; height: 18px; }
    .preview {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 14px;
      align-items: start;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fafcff;
    }
    .thumb {
      aspect-ratio: 16 / 10;
      width: 100%;
      background: #e9eef6 center / cover no-repeat;
      border: 1px solid var(--line);
      border-radius: 6px;
    }
    .file-list { margin: 6px 0 0; padding-left: 18px; color: var(--muted); font-size: 12px; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .divider { height: 1px; background: var(--line); margin: 2px 0; }
    .path-list { display: grid; gap: 8px; }
    .path-row { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center; }
    .path-row input { font-size: 13px; }
    .path-row.mismatch input { border-color: #f79009; background: #fffbeb; }
    .mini-btn { min-height: 38px; border: 1px solid var(--line); border-radius: 8px; background: #fff; padding: 0 12px; font-weight: 900; }
    .mini-btn.danger { color: var(--red); border-color: #f1b8b2; }
    .upload-row { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: end; }
    code { background: #eef2f7; border-radius: 4px; padding: 2px 5px; }
    @media (max-width: 980px) {
      main { grid-template-columns: 1fr; }
      .portfolio-list { max-height: none; }
      .grid, .grid.three, .preview, .upload-row, .path-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div class="top">
        <div>
          <h1>QDM 포트폴리오 로컬 관리자</h1>
          <p class="sub">홈페이지 폴더를 선택한 뒤 포트폴리오 상세 페이지, 이미지, <code>data/portfolios.json</code>을 자동 생성합니다.</p>
        </div>
        <div class="toolbar">
          <a class="btn" href="index.html">관리자 홈</a>
          <button class="btn primary" id="pickRootBtn" type="button">홈페이지 폴더 선택</button>
          <button class="btn" id="reloadBtn" type="button" disabled>다시 불러오기</button>
          <button class="btn green" id="newBtn" type="button" disabled>새 포트폴리오</button>
        </div>
      </div>
    </header>

    <main>
      <aside class="panel">
        <div class="panel-head">
          <div class="panel-title">포트폴리오 목록</div>
          <div class="hint" id="countText">0개</div>
        </div>
        <div class="panel-body">
          <div id="status" class="status warn">Chrome 또는 Edge에서 이 파일을 열고, 먼저 홈페이지 루트 폴더를 선택하세요.</div>
          <div style="height:14px"></div>
          <div class="filters" id="filters"></div>
          <div class="portfolio-list" id="portfolioList"></div>
        </div>
      </aside>

      <section class="panel">
        <div class="panel-head">
          <div>
            <div class="panel-title" id="editorTitle">새 포트폴리오 생성</div>
          </div>
          <button class="btn danger" id="deleteBtn" type="button" disabled>목록/파일 완전 삭제</button>
        </div>
        <div class="panel-body">
          <form id="portfolioForm">
            <div class="grid three">
              <label>분류
                <select id="category" required></select>
              </label>
              <label>폴더명 / slug
                <input id="slug" type="text" placeholder="예: seat-bracket" required>
                <span class="hint">영문, 숫자, 하이픈 권장. 저장 경로에 사용됩니다.</span>
              </label>
              <label>노출 순서
                <input id="order" type="number" min="1" step="1" value="1">
              </label>
            </div>

            <div class="grid">
              <label>제목
                <input id="title" type="text" placeholder="예: 자동차 시트 부품 프레스 성형 검토" required>
              </label>
              <label>상세 상단 한 줄 문구
                <input id="subtitle" type="text" placeholder="예: 개방형 형상의 쏠림 현상 대응과 블랭크 형상 검토">
              </label>
            </div>

            <label>메인 목록 요약 문구
              <textarea id="summary" placeholder="메인 화면과 전체 포트폴리오 목록에 표시될 짧은 설명입니다." required></textarea>
            </label>

            <label>상세페이지 프로젝트 개요
              <textarea id="overview" placeholder="상세페이지의 프로젝트 개요 본문입니다."></textarea>
            </label>

            <label>수행 내용
              <textarea id="tasks" placeholder="한 줄에 하나씩 입력하세요."></textarea>
            </label>

            <div class="grid">
              <label>태그
                <input id="tags" type="text" placeholder="예: 성형해석, 블랭크 검토, 금형설계">
                <span class="hint">쉼표로 구분합니다. 상세 페이지에는 전체가 표시되고, 메인/목록 카드에는 앞 2개만 표시됩니다.</span>
              </label>
              <label>메인 노출
                <span class="check-row"><input id="featured" type="checkbox"> 대표 실적 / 프로젝트에 표시</span>
                <span class="hint" id="featuredHint">현재 메인 노출 0개. 기존 사이트에는 제한 코드가 없지만 6개 이하를 권장합니다.</span>
              </label>
            </div>

            <div class="divider"></div>

            <div class="grid">
              <label>대표 이미지
                <input id="mainImage" type="file" accept="image/*">
                <span class="hint" id="mainImageHint">16:9 또는 4:3, 최소 1200px 폭을 권장합니다. 새 대표 이미지를 선택하면 기존 JSON 이미지 경로가 새 파일로 교체됩니다.</span>
              </label>
              <label>상세 이미지 추가 등록
                <span class="upload-row">
                  <input id="galleryImages" type="file" accept="image/*" multiple>
                  <button class="mini-btn" id="confirmGalleryBtn" type="button">추가 확인</button>
                </span>
                <span class="hint">3~6장 정도가 적당합니다. 파일 선택 후 `추가 확인`을 눌러야 상세 이미지 목록에 반영됩니다.</span>
              </label>
            </div>

            <label>현재 상세 이미지 경로
              <div class="path-list" id="galleryPathList"></div>
              <textarea id="existingGalleryPaths" placeholder="/assets/portfolio/.../image.jpg" hidden></textarea>
              <span class="hint">대표 이미지를 제외한 추가 상세 이미지만 표시합니다. 삭제 버튼은 실제 로컬 파일도 함께 삭제합니다.</span>
            </label>

            <div class="preview">
              <div class="thumb" id="mainPreview"></div>
              <div>
                <div class="hint">저장 예정 경로</div>
                <div id="pathPreview"><code>assets/portfolio/[분류]/[slug]/portfolio.html</code></div>
                <ul class="file-list" id="imageInfo"></ul>
              </div>
            </div>

            <div class="actions">
              <button class="btn green" id="saveBtn" type="submit" disabled>파일 생성 / JSON 저장</button>
              <button class="btn" id="saveJsonOnlyBtn" type="button" disabled>목록 설정만 저장</button>
              <span class="hint">저장 전 <code>data/portfolios.backup-날짜.json</code> 백업을 1회 생성합니다.</span>
            </div>
          </form>
        </div>
      </section>
    </main>
  </div>

  <script src="admin-shared.js"></script>
  <script>
    const categories = [
      { id: "mechanical", name: "01 기계·기구설계" },
      { id: "analysis", name: "02 구조해석" },
      { id: "press-die", name: "03 프레스 금형설계" },
      { id: "reverse", name: "04 역설계" }
    ];

    const state = {
      rootHandle: null,
      portfolios: [],
      selectedIndex: -1,
      filter: "all",
      backupMade: false,
      mainImageFile: null,
      galleryFiles: [],
      pendingGalleryFiles: [],
      existingGalleryPaths: []
    };

    const $ = (id) => document.getElementById(id);
    const form = $("portfolioForm");

    function setStatus(message, type = "") {
      const el = $("status");
      el.className = `status ${type}`.trim();
      el.textContent = message;
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function slugify(value) {
      return String(value || "")
        .trim()
        .toLowerCase()
        .replace(/[^a-z0-9가-힣_-]+/g, "-")
        .replace(/-+/g, "-")
        .replace(/^-|-$/g, "");
    }

    function sanitizeFileName(name) {
      const dot = name.lastIndexOf(".");
      const base = dot > -1 ? name.slice(0, dot) : name;
      const ext = dot > -1 ? name.slice(dot).toLowerCase().replace(/[^.a-z0-9]/g, "") : "";
      return `${slugify(base) || "image"}${ext || ".jpg"}`;
    }

    function categoryName(categoryId) {
      return categories.find((c) => c.id === categoryId)?.name || categoryId;
    }

    function categoryPlainName(categoryId) {
      return categoryName(categoryId).replace(/^\d+\s*/, "");
    }

    async function getDir(parent, name, create = false) {
      return parent.getDirectoryHandle(name, { create });
    }

    async function getFile(parent, name, create = false) {
      return parent.getFileHandle(name, { create });
    }

    async function readText(path) {
      let dir = state.rootHandle;
      const parts = path.split("/");
      for (const part of parts.slice(0, -1)) dir = await getDir(dir, part);
      const file = await getFile(dir, parts.at(-1));
      return await (await file.getFile()).text();
    }

    async function writeBlob(path, blob) {
      let dir = state.rootHandle;
      const parts = path.split("/");
      for (const part of parts.slice(0, -1)) dir = await getDir(dir, part, true);
      const fileHandle = await getFile(dir, parts.at(-1), true);
      const writable = await fileHandle.createWritable();
      await writable.write(blob);
      await writable.close();
    }

    async function pathExists(path) {
      try {
        let dir = state.rootHandle;
        const parts = path.split("/");
        for (const part of parts.slice(0, -1)) dir = await getDir(dir, part);
        await getFile(dir, parts.at(-1));
        return true;
      } catch {
        return false;
      }
    }

    async function makeBackupOnce() {
      if (state.backupMade) return;
      const stamp = new Date().toISOString().replace(/[-:]/g, "").replace(/\..+/, "").replace("T", "-");
      await writeBlob(`data/portfolios.backup-${stamp}.json`, new Blob([JSON.stringify(state.portfolios, null, 2)], { type: "application/json;charset=utf-8" }));
      state.backupMade = true;
    }

    async function loadPortfolios() {
      const text = await readText("data/portfolios.json");
      state.portfolios = JSON.parse(text);
      state.selectedIndex = -1;
      state.backupMade = false;
      renderAll();
      newPortfolio();
      setStatus(`불러오기 완료: data/portfolios.json에서 ${state.portfolios.length}개 항목을 읽었습니다.`, "good");
    }

    function renderCategories() {
      const currentCategory = $("category").value;
      $("category").innerHTML = categories.map((c) => `<option value="${c.id}">${c.name}</option>`).join("");
      if (currentCategory) $("category").value = currentCategory;
      $("filters").innerHTML = [
        `<button class="chip ${state.filter === "all" ? "active" : ""}" data-filter="all" type="button">전체</button>`,
        ...categories.map((c) => `<button class="chip ${state.filter === c.id ? "active" : ""}" data-filter="${c.id}" type="button">${c.name}</button>`)
      ].join("");
      document.querySelectorAll("[data-filter]").forEach((btn) => {
        btn.addEventListener("click", () => {
          state.filter = btn.dataset.filter;
          renderAll();
        });
      });
    }

    function renderList() {
      const list = state.portfolios
        .map((p, index) => ({ p, index }))
        .filter(({ p }) => state.filter === "all" || p.category === state.filter)
        .sort((a, b) => (a.p.order || 0) - (b.p.order || 0));
      $("countText").textContent = `${state.portfolios.length}개`;
      $("portfolioList").innerHTML = list.map(({ p, index }) => `
        <button class="item ${state.selectedIndex === index ? "active" : ""}" type="button" data-index="${index}">
          <div class="item-top">
            <div class="item-title">${escapeHtml(p.title)}</div>
            ${p.featured ? '<div class="featured">메인 노출</div>' : ''}
          </div>
          <div class="item-meta">${escapeHtml(p.categoryName || categoryName(p.category))} · order ${p.order || "-"}<br>${escapeHtml(p.url || "")}</div>
        </button>
      `).join("") || '<div class="hint">해당 분류의 포트폴리오가 없습니다.</div>';
      document.querySelectorAll("[data-index]").forEach((btn) => {
        btn.addEventListener("click", () => selectPortfolio(Number(btn.dataset.index)).catch((error) => setStatus(error.message, "bad")));
      });
    }

    function renderFeaturedHint() {
      const featuredCount = state.portfolios.filter((p, i) => p.featured && i !== state.selectedIndex).length + ($("featured").checked ? 1 : 0);
      const suffix = featuredCount > 6 ? " 6개 초과입니다. 현재 홈페이지 코드는 모두 표시하지만, 메인 화면이 길어질 수 있습니다." : " 6개 이하를 권장합니다.";
      $("featuredHint").textContent = `현재 메인 노출 ${featuredCount}개.${suffix}`;
      $("featuredHint").style.color = featuredCount > 6 ? "var(--yellow)" : "var(--muted)";
    }

    function renderAll() {
      renderCategories();
      renderList();
      renderFeaturedHint();
      updatePathPreview();
    }

    function formValue() {
      const category = $("category").value;
      const slug = slugify($("slug").value);
      const tags = $("tags").value.split(",").map((v) => v.trim()).filter(Boolean);
      return {
        category,
        categoryName: categoryName(category),
        title: $("title").value.trim(),
        subtitle: $("subtitle").value.trim(),
        slug,
        summary: $("summary").value.trim(),
        overview: $("overview").value.trim(),
        tags,
        tasks: $("tasks").value.split(/\n+/).map((v) => v.trim()).filter(Boolean),
        featured: $("featured").checked,
        order: Number($("order").value || state.portfolios.length + 1)
      };
    }

    function fillForm(portfolio) {
      $("category").value = portfolio.category || categories[0].id;
      $("slug").value = inferSlug(portfolio);
      $("order").value = portfolio.order || state.portfolios.length + 1;
      $("title").value = portfolio.title || "";
      $("subtitle").value = portfolio.subtitle || "";
      $("summary").value = portfolio.summary || portfolio.description || "";
      $("overview").value = portfolio.overview || portfolio.summary || portfolio.description || "";
      $("tags").value = (portfolio.tags || []).join(", ");
      $("featured").checked = Boolean(portfolio.featured);
      $("tasks").value = portfolio.tasks ? portfolio.tasks.join("\n") : "";
      $("mainImage").value = "";
      $("galleryImages").value = "";
      state.mainImageFile = null;
      state.galleryFiles = [];
      state.pendingGalleryFiles = [];
      state.existingGalleryPaths = removeMainPath(portfolio.galleryPaths || [], portfolio.image);
      $("existingGalleryPaths").value = state.existingGalleryPaths.join("\n");
      $("mainPreview").style.backgroundImage = portfolio.image ? `url("../${portfolio.image}")` : "";
      $("category").disabled = state.selectedIndex >= 0;
      $("slug").readOnly = state.selectedIndex >= 0;
      renderImageInfo();
      renderGalleryPathList();
      renderFeaturedHint();
      updatePathPreview();
    }

    function inferSlug(portfolio) {
      if (portfolio?.url) {
        const parts = portfolio.url.split("/");
        return parts.at(-2) || "";
      }
      return slugify(portfolio?.title || "");
    }

    function newPortfolio() {
      state.selectedIndex = -1;
      $("editorTitle").textContent = "새 포트폴리오 생성";
      $("deleteBtn").disabled = true;
      fillForm({
        category: categories[0].id,
        order: nextOrder(),
        featured: false
      });
      $("mainImageHint").textContent = "새 포트폴리오 생성 시 필수입니다.";
      $("category").disabled = false;
      $("slug").readOnly = false;
      renderList();
    }

    async function selectPortfolio(index) {
      state.selectedIndex = index;
      $("editorTitle").textContent = "기존 포트폴리오 수정";
      $("deleteBtn").disabled = false;
      $("mainImageHint").textContent = "16:9 또는 4:3, 최소 1200px 폭을 권장합니다. 새 대표 이미지를 선택하면 기존 JSON 이미지 경로가 새 파일로 교체됩니다.";
      fillForm(await hydratePortfolioFromDetail(state.portfolios[index]));
      renderList();
    }

    async function hydratePortfolioFromDetail(portfolio) {
      if (!portfolio?.url) return portfolio;
      try {
        const html = await readText(portfolio.url);
        return { ...portfolio, ...parseDetailHtml(html) };
      } catch {
        return portfolio;
      }
    }

    function parseDetailHtml(html) {
      const doc = new DOMParser().parseFromString(html, "text/html");
      const detailBox = doc.querySelector(".detail-box");
      const badges = [...(detailBox?.querySelectorAll(":scope > .badge") || [])].map((el) => el.textContent.trim()).filter(Boolean);
      const image = normalizeAssetPath(extractBackgroundUrl(doc.querySelector(".detail-img")?.getAttribute("style") || ""));
      return {
        subtitle: textOf(doc.querySelector(".page-hero p")),
        overview: paragraphAfterHeading(doc, "h2", "프로젝트 개요"),
        tasks: listAfterHeading(doc, "h3", "수행 내용"),
        tags: badges.slice(1),
        image,
        galleryPaths: removeMainPath([...doc.querySelectorAll(".gallery img")].map((img) => normalizeAssetPath(img.getAttribute("src"))).filter(Boolean), image)
      };
    }

    function textOf(node) {
      return node ? node.textContent.trim() : "";
    }

    function paragraphAfterHeading(doc, tagName, headingText) {
      const heading = [...doc.querySelectorAll(tagName)].find((el) => el.textContent.trim() === headingText);
      let node = heading?.nextElementSibling;
      while (node && node.tagName !== "P") node = node.nextElementSibling;
      return textOf(node);
    }

    function listAfterHeading(doc, tagName, headingText) {
      const heading = [...doc.querySelectorAll(tagName)].find((el) => el.textContent.trim() === headingText);
      let node = heading?.nextElementSibling;
      while (node && node.tagName !== "UL") node = node.nextElementSibling;
      return [...(node?.querySelectorAll("li") || [])].map((li) => li.textContent.trim()).filter(Boolean);
    }

    function extractBackgroundUrl(styleValue) {
      const match = String(styleValue || "").match(/url\((['"]?)(.*?)\1\)/);
      return match ? match[2] : "";
    }

    function normalizeAssetPath(path) {
      return String(path || "").trim().replace(/^https?:\/\/[^/]+/i, "").replace(/^\/+/, "");
    }

    function removeMainPath(paths, mainPath) {
      const normalizedMain = normalizeAssetPath(mainPath);
      return [...new Set((paths || []).map((path) => normalizeAssetPath(path)).filter(Boolean))]
        .filter((path) => path !== normalizedMain);
    }

    function nextOrder() {
      return Math.max(0, ...state.portfolios.map((p) => Number(p.order || 0))) + 1;
    }

    function updatePathPreview() {
      const data = formValue();
      const base = `assets/portfolio/${data.category}/${data.slug || "[slug]"}`;
      $("pathPreview").innerHTML = `<code>${base}/portfolio.html</code><br><code>${base}/main.[확장자]</code>`;
    }

    function renderImageInfo() {
      const items = [];
      const existingPaths = state.existingGalleryPaths.slice();
      if (state.mainImageFile) items.push(`새 대표 이미지: ${state.mainImageFile.name}`);
      if (!state.mainImageFile && state.selectedIndex >= 0 && state.portfolios[state.selectedIndex]?.image) items.push(`현재 대표 이미지: ${state.portfolios[state.selectedIndex].image}`);
      for (const path of existingPaths) items.push(`상세 이미지: ${path}`);
      for (const file of state.galleryFiles) items.push(`추가 이미지: ${file.name}`);
      for (const file of state.pendingGalleryFiles) items.push(`확인 대기: ${file.name}`);
      $("imageInfo").innerHTML = items.map((name) => `<li>${escapeHtml(name)}</li>`).join("");
    }

    function parsePathLines(value) {
      return String(value || "").split(/\n+/).map((v) => normalizeAssetPath(v)).filter(Boolean);
    }

    function syncGalleryTextarea() {
      $("existingGalleryPaths").value = state.existingGalleryPaths.join("\n");
    }

    function renderGalleryPathList() {
      syncGalleryTextarea();
      const list = $("galleryPathList");
      const base = currentProjectBase();
      list.innerHTML = state.existingGalleryPaths.map((path, index) => `
        <div class="path-row ${base && !path.startsWith(`${base}/`) ? "mismatch" : ""}">
          <input value="${escapeHtml(path)}" data-gallery-path-index="${index}" aria-label="상세 이미지 경로">
          <button class="mini-btn danger" type="button" data-delete-gallery-path="${index}">삭제</button>
        </div>
      `).join("") || '<div class="hint">등록된 상세 이미지가 없습니다.</div>';
      document.querySelectorAll("[data-gallery-path-index]").forEach((input) => {
        input.addEventListener("input", () => {
          state.existingGalleryPaths[Number(input.dataset.galleryPathIndex)] = normalizeAssetPath(input.value);
          syncGalleryTextarea();
          renderImageInfo();
        });
      });
      document.querySelectorAll("[data-delete-gallery-path]").forEach((btn) => {
        btn.addEventListener("click", () => deleteGalleryPath(Number(btn.dataset.deleteGalleryPath)).catch((error) => setStatus(error.message, "bad")));
      });
      renderImageInfo();
    }

    function currentProjectBase() {
      const data = formValue();
      return data.category && data.slug ? `assets/portfolio/${data.category}/${data.slug}` : "";
    }

    function galleryPathMismatches(paths, base) {
      if (!base) return [];
      return paths.filter((path) => !path.startsWith(`${base}/`));
    }

    async function removeFilePath(path) {
      const normalized = normalizeAssetPath(path);
      if (!normalized) return;
      let dir = state.rootHandle;
      const parts = normalized.split("/");
      for (const part of parts.slice(0, -1)) dir = await getDir(dir, part);
      await dir.removeEntry(parts.at(-1));
    }

    async function removeDirectoryPath(path) {
      const normalized = normalizeAssetPath(path);
      if (!normalized) return;
      let dir = state.rootHandle;
      const parts = normalized.split("/");
      for (const part of parts.slice(0, -1)) dir = await getDir(dir, part);
      await dir.removeEntry(parts.at(-1), { recursive: true });
    }

    function projectDirectoryFromPortfolio(portfolio) {
      if (!portfolio?.url) return "";
      return portfolio.url.split("/").slice(0, -1).join("/");
    }

    async function deleteGalleryPath(index) {
      const path = state.existingGalleryPaths[index];
      if (!path) return;
      if (!confirm(`이 상세 이미지를 실제 로컬 파일까지 삭제할까요?\n\n${path}`)) return;
      try {
        await removeFilePath(path);
      } catch (error) {
        if (!confirm(`파일 삭제 중 문제가 있었습니다.\n${error.message}\n\n목록에서는 제거할까요?`)) return;
      }
      state.existingGalleryPaths.splice(index, 1);
      renderGalleryPathList();
      setStatus("상세 이미지 파일을 삭제하고 목록에서 제거했습니다. 상세 HTML 반영은 `파일 생성 / JSON 저장`을 누르면 완료됩니다.", "good");
    }

    function buildDetailHtml(data, mainPath, galleryPaths) {
      const tags = data.tags.map((tag) => `<span class="badge">${escapeHtml(tag)}</span>`).join("");
      const tasks = data.tasks.map((task) => `<li>${escapeHtml(task)}</li>`).join("");
      const gallery = galleryPaths.map((path) => `<img src="/${escapeHtml(path)}" alt="${escapeHtml(data.title)} 이미지">`).join("");
      const metaDescription = data.overview || data.summary;
      return `<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>${escapeHtml(data.title)} | QDM 포트폴리오</title>
  <meta name="description" content="${escapeHtml(metaDescription)}">
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
<header class="topbar"><div class="wrap nav"><a href="/index.html" class="brand" aria-label="QDM home"><div class="logo">QDM</div><div class="tagline">설계 · 해석 · 금형설계 · 역설계 전문<br>TOTAL ENGINEERING SOLUTION</div></a><nav class="menu" aria-label="주요 메뉴"><a class="hide-sm" href="/index.html#about">회사소개</a><a href="/index.html#portfolio">포트폴리오</a><a class="hide-sm" href="/portfolio.html">전체실적</a><a class="hide-sm" href="/index.html#blog">기술블로그</a><a href="/index.html#contact">문의하기</a><a class="phone" href="tel:07080646621">☎ 070-8064-6621</a></nav></div></header>
<main>
  <section class="page-hero"><div class="wrap"><div class="breadcrumb">Home / Portfolio / ${escapeHtml(categoryPlainName(data.category))}</div><h1>${escapeHtml(data.title)}</h1><p>${escapeHtml(data.subtitle || data.summary)}</p></div></section>
  <section><div class="wrap detail-grid"><div class="detail-img" style="background-image:url('/${escapeHtml(mainPath)}')"></div><div class="detail-box"><span class="badge">${escapeHtml(categoryPlainName(data.category))}</span>${tags}<h2>프로젝트 개요</h2><p>${escapeHtml(data.overview || data.summary)}</p>${tasks ? `<h3>수행 내용</h3><ul>${tasks}</ul>` : ""}<p><a class="btn primary" href="/index.html#contact">문의하기 →</a> <a class="btn secondary" href="/portfolio.html?category=${escapeHtml(data.category)}">같은 분야 보기 →</a></p></div></div></section>
  <section class="about"><div class="wrap"><div class="section-head"><div><div class="section-kicker">Project Images</div><h2 class="section-title">대표 이미지</h2></div><p class="section-desc">보안상 세부 치수와 고객사 식별 정보는 제외하고, 포트폴리오용으로 일반화하여 표시합니다.</p></div><div class="gallery">${gallery}</div></div></section>
</main>
<footer class="footer"><div class="wrap footer-inner"><div><strong>QDM 큐디엠</strong> · 기계설계 · 구조해석 · 프레스 금형설계 · 역설계</div><div>© QDM. All rights reserved.</div></div></footer>
</body>
</html>
`;
    }

    async function saveJson() {
      await makeBackupOnce();
      await writeBlob("data/portfolios.json", new Blob([JSON.stringify(state.portfolios, null, 2)], { type: "application/json;charset=utf-8" }));
    }

    function upsertPortfolio(entry) {
      if (state.selectedIndex >= 0) {
        state.portfolios[state.selectedIndex] = { ...state.portfolios[state.selectedIndex], ...entry };
      } else {
        state.portfolios.push(entry);
        state.selectedIndex = state.portfolios.length - 1;
      }
      state.portfolios.sort((a, b) => (a.order || 0) - (b.order || 0));
      state.selectedIndex = state.portfolios.findIndex((p) => p.url === entry.url);
    }

    async function saveFull(event) {
      event.preventDefault();
      if (!state.rootHandle) return;
      const data = formValue();
      if (!data.title || !data.slug || !data.summary) {
        setStatus("제목, slug, 요약 문구는 필수입니다.", "bad");
        return;
      }
      const editing = state.selectedIndex >= 0;
      const existing = editing ? state.portfolios[state.selectedIndex] : null;
      if (!editing && !state.mainImageFile) {
        setStatus("새 포트폴리오를 만들려면 대표 이미지를 선택해야 합니다.", "bad");
        return;
      }
      const base = `assets/portfolio/${data.category}/${data.slug}`;
      if (!editing && await pathExists(`${base}/portfolio.html`)) {
        setStatus("같은 경로의 portfolio.html이 이미 있습니다. slug를 바꾸거나 기존 항목을 선택해서 수정하세요.", "bad");
        return;
      }

      const mainFileName = state.mainImageFile ? `main${extensionOf(state.mainImageFile.name)}` : (existing?.image?.split("/").at(-1) || "main.jpg");
      const mainPath = `${base}/${mainFileName}`;
      if (state.mainImageFile) await writeBlob(mainPath, state.mainImageFile);

      const galleryPaths = removeMainPath(state.existingGalleryPaths, mainPath);
      const mismatches = galleryPathMismatches(galleryPaths, base);
      if (mismatches.length) {
        setStatus(`현재 포트폴리오 폴더 밖의 상세 이미지 경로가 있습니다. 삭제하거나 같은 폴더로 옮긴 뒤 저장하세요: ${mismatches.join(", ")}`, "bad");
        return;
      }
      for (const file of state.galleryFiles) {
        const name = sanitizeFileName(file.name);
        const path = `${base}/${name}`;
        await writeBlob(path, file);
        galleryPaths.push(path);
      }
      galleryPaths.unshift(mainPath);

      const pagePath = `${base}/portfolio.html`;
      const html = buildDetailHtml(data, mainPath, galleryPaths);
      await writeBlob(pagePath, new Blob([html], { type: "text/html;charset=utf-8" }));

      const entry = {
        category: data.category,
        categoryName: data.categoryName,
        title: data.title,
        summary: data.summary,
        image: mainPath,
        url: pagePath,
        featured: data.featured,
        order: data.order,
        tags: data.tags
      };
      upsertPortfolio(entry);
      await saveJson();
      renderAll();
      state.galleryFiles = [];
      state.pendingGalleryFiles = [];
      await selectPortfolio(state.selectedIndex);
      setStatus(`저장 완료: ${pagePath}, 이미지, data/portfolios.json이 갱신되었습니다. GitHub에 변경 파일을 올리면 Vercel에 반영됩니다.`, "good");
    }

    function extensionOf(name) {
      const match = String(name).toLowerCase().match(/\.[a-z0-9]+$/);
      return match ? match[0] : ".jpg";
    }

    async function saveJsonOnly() {
      if (!state.rootHandle || state.selectedIndex < 0) return;
      const data = formValue();
      const existing = state.portfolios[state.selectedIndex];
      state.portfolios[state.selectedIndex] = {
        ...existing,
        category: data.category,
        categoryName: data.categoryName,
        title: data.title,
        summary: data.summary,
        featured: data.featured,
        order: data.order,
        tags: data.tags
      };
      await saveJson();
      renderAll();
      setStatus("목록 설정 저장 완료: data/portfolios.json만 갱신했습니다.", "good");
    }

    async function deleteFromList() {
      if (state.selectedIndex < 0) return;
      const target = state.portfolios[state.selectedIndex];
      const projectDir = projectDirectoryFromPortfolio(target);
      if (!confirm(`포트폴리오를 완전히 삭제할까요?\n\n${target.title}\n\n삭제 대상:\n- data/portfolios.json 목록 항목\n- ${projectDir || "프로젝트 폴더"} 전체\n\n이 작업은 로컬 파일도 삭제합니다.`)) return;
      await makeBackupOnce();
      if (projectDir) {
        try {
          await removeDirectoryPath(projectDir);
        } catch (error) {
          if (!confirm(`프로젝트 폴더 삭제 중 문제가 있었습니다.\n${error.message}\n\n그래도 JSON 목록에서는 제거할까요?`)) return;
        }
      }
      state.portfolios.splice(state.selectedIndex, 1);
      state.selectedIndex = -1;
      await saveJson();
      renderAll();
      newPortfolio();
      setStatus("포트폴리오 목록과 프로젝트 폴더 삭제를 완료했습니다.", "good");
    }

    async function useRootHandle(handle, shared = false) {
      state.rootHandle = handle;
      $("reloadBtn").disabled = false;
      $("newBtn").disabled = false;
      $("saveBtn").disabled = false;
      $("saveJsonOnlyBtn").disabled = false;
      await loadPortfolios();
      if (shared) setStatus(`공유된 폴더를 불러왔습니다: ${handle.name}`, "good");
    }

    async function pickRoot() {
      await useRootHandle(await QdmAdminStorage.pickAndSaveRoot());
    }

    $("pickRootBtn").addEventListener("click", () => pickRoot().catch((error) => setStatus(error.message, "bad")));
    $("reloadBtn").addEventListener("click", () => loadPortfolios().catch((error) => setStatus(error.message, "bad")));
    $("newBtn").addEventListener("click", newPortfolio);
    $("deleteBtn").addEventListener("click", () => deleteFromList().catch((error) => setStatus(error.message, "bad")));
    $("saveJsonOnlyBtn").addEventListener("click", () => saveJsonOnly().catch((error) => setStatus(error.message, "bad")));
    form.addEventListener("submit", (event) => saveFull(event).catch((error) => setStatus(error.message, "bad")));
    ["category", "slug", "title", "summary", "featured", "order"].forEach((id) => {
      $(id).addEventListener("input", () => {
        if (id === "title" && !$("slug").value.trim() && state.selectedIndex < 0) $("slug").value = slugify($("title").value);
        updatePathPreview();
        renderFeaturedHint();
      });
    });
    $("mainImage").addEventListener("change", () => {
      state.mainImageFile = $("mainImage").files[0] || null;
      if (state.mainImageFile) $("mainPreview").style.backgroundImage = `url("${URL.createObjectURL(state.mainImageFile)}")`;
      renderImageInfo();
    });
    $("galleryImages").addEventListener("change", () => {
      state.pendingGalleryFiles = Array.from($("galleryImages").files || []);
      renderImageInfo();
    });
    $("confirmGalleryBtn").addEventListener("click", () => {
      if (!state.pendingGalleryFiles.length) {
        setStatus("추가할 상세 이미지 파일을 먼저 선택하세요.", "bad");
        return;
      }
      state.galleryFiles.push(...state.pendingGalleryFiles);
      state.pendingGalleryFiles = [];
      $("galleryImages").value = "";
      renderImageInfo();
      setStatus("상세 이미지 추가를 확인했습니다. `파일 생성 / JSON 저장`을 누르면 실제 파일로 저장됩니다.", "good");
    });
    $("existingGalleryPaths").addEventListener("input", () => {
      state.existingGalleryPaths = parsePathLines($("existingGalleryPaths").value);
      renderGalleryPathList();
    });

    renderCategories();
    newPortfolio();
    QdmAdminStorage.loadSavedRoot().then((handle) => {
      if (handle) return useRootHandle(handle, true);
    }).catch(() => {});
  </script>
</body>
</html>
