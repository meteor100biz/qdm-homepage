<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QDM 관리자</title>
  <style>
    :root{--blue:#06306f;--blue2:#0b4fb3;--ink:#172033;--muted:#667085;--line:#d8e0ec;--bg:#f3f6fb}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;font-family:Arial,"Noto Sans KR","Apple SD Gothic Neo",sans-serif;color:var(--ink);background:var(--bg);display:grid;place-items:center;padding:28px}
    .wrap{width:min(980px,100%)}
    h1{margin:0 0 8px;color:var(--blue);font-size:32px}
    p{margin:0;color:var(--muted);font-weight:700}
    .actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:18px}
    .btn{border:1px solid var(--blue);background:var(--blue);color:#fff;border-radius:8px;min-height:42px;padding:0 15px;font-weight:900}
    .status{padding:10px 12px;border:1px solid #fed7aa;background:#fff7ed;color:#a15c00;border-radius:8px;font-size:13px;font-weight:700}
    .status.good{border-color:#abefc6;background:#ecfdf3;color:#0b7a53}
    .status.bad{border-color:#fecdca;background:#fef3f2;color:#b42318}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:28px}
    .card{display:grid;gap:12px;min-height:210px;padding:24px;border:1px solid var(--line);border-radius:8px;background:#fff;color:inherit;text-decoration:none;box-shadow:0 12px 28px rgba(15,35,68,.06);transition:.2s}
    .card:hover{transform:translateY(-3px);box-shadow:0 18px 38px rgba(15,35,68,.12);border-color:#b8c7dd}
    .icon{width:44px;height:44px;border-radius:8px;background:#eaf2ff;color:var(--blue2);display:grid;place-items:center;font-size:24px;font-weight:900}
    h2{margin:0;font-size:21px;color:#0b234b}
    .desc{font-size:14px;line-height:1.55;color:var(--muted)}
    .go{align-self:end;color:var(--blue2);font-weight:900}
    @media(max-width:760px){.grid{grid-template-columns:1fr}h1{font-size:26px}.card{min-height:170px}}
  </style>
</head>
<body>
  <main class="wrap">
    <h1>QDM 관리자</h1>
    <p>수정할 영역을 선택하세요. 홈페이지 폴더를 한 번 공유하면 각 관리자가 같은 폴더를 사용합니다.</p>
    <div class="actions">
      <button class="btn" id="pickRootBtn" type="button">홈페이지 폴더 선택 / 공유</button>
      <div class="status" id="status">아직 공유된 홈페이지 폴더가 없습니다.</div>
    </div>
    <div class="grid">
      <a class="card" href="home-admin.html">
        <div class="icon">⌂</div>
        <h2>메인 홈페이지 수정</h2>
        <div class="desc">전화번호, 이메일, 주소, 블로그 대표 링크 등 메인 페이지의 기본 연락처 정보를 수정합니다.</div>
        <div class="go">열기 →</div>
      </a>
      <a class="card" href="portfolio-admin.html">
        <div class="icon">▦</div>
        <h2>포트폴리오 수정</h2>
        <div class="desc">포트폴리오 생성, 상세 내용, 이미지, 메인 노출 여부와 순서를 관리합니다.</div>
        <div class="go">열기 →</div>
      </a>
      <a class="card" href="blog-admin.html">
        <div class="icon">✎</div>
        <h2>블로그 수정</h2>
        <div class="desc">최신 기술자료 카드의 이미지, 제목, 설명, 네이버 블로그 링크를 수정합니다.</div>
        <div class="go">열기 →</div>
      </a>
    </div>
  </main>
  <script src="admin-shared.js"></script>
  <script>
    const statusEl = document.getElementById("status");
    function setStatus(message, type = "") {
      statusEl.className = `status ${type}`.trim();
      statusEl.textContent = message;
    }
    document.getElementById("pickRootBtn").addEventListener("click", async () => {
      try {
        const handle = await QdmAdminStorage.pickAndSaveRoot();
        setStatus(`공유 완료: ${handle.name}`, "good");
      } catch (error) {
        setStatus(error.message, "bad");
      }
    });
    QdmAdminStorage.loadSavedRoot()
      .then((handle) => {
        if (handle) setStatus(`공유된 폴더 사용 가능: ${handle.name}`, "good");
      })
      .catch(() => {});
  </script>
</body>
</html>
