<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QDM 블로그 관리자</title>
  <style>
    :root{--blue:#06306f;--blue2:#0b4fb3;--green:#0b7a53;--red:#b42318;--yellow:#a15c00;--ink:#172033;--muted:#667085;--line:#d8e0ec;--bg:#f3f6fb}
    *{box-sizing:border-box} body{margin:0;font-family:Arial,"Noto Sans KR","Apple SD Gothic Neo",sans-serif;color:var(--ink);background:var(--bg);line-height:1.55}
    header{background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:2}.top{max-width:1180px;margin:0 auto;padding:18px 24px;display:flex;justify-content:space-between;align-items:center;gap:16px}
    h1{margin:0;color:var(--blue);font-size:22px}.sub{margin:3px 0 0;color:var(--muted);font-size:13px;font-weight:700}
    main{max-width:1180px;margin:0 auto;padding:22px 24px 42px;display:grid;grid-template-columns:310px 1fr;gap:18px}.panel{background:#fff;border:1px solid var(--line);border-radius:8px;overflow:hidden}.head{padding:15px 17px;border-bottom:1px solid var(--line);font-weight:900}.body{padding:17px;display:grid;gap:16px}
    .btn{border:1px solid var(--line);background:#fff;border-radius:8px;min-height:42px;padding:0 15px;font-weight:900;color:var(--ink);text-decoration:none;display:inline-flex;align-items:center}.btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}.btn.green{background:var(--green);border-color:var(--green);color:#fff}.btn:disabled{opacity:.45;cursor:not-allowed}
    .toolbar{display:flex;gap:10px;flex-wrap:wrap}.status{padding:11px 13px;border-radius:8px;background:#fff7ed;border:1px solid #fed7aa;color:var(--yellow);font-size:13px;font-weight:700}.status.good{background:#ecfdf3;border-color:#abefc6;color:var(--green)}.status.bad{background:#fef3f2;border-color:#fecdca;color:var(--red)}
    .list{display:grid;gap:10px}.item{text-align:left;border:1px solid var(--line);background:#fff;border-radius:8px;padding:12px;font:inherit;font-weight:900}.item.active{border-color:var(--blue2);box-shadow:0 0 0 3px rgba(11,79,179,.12)}.meta{display:block;margin-top:5px;color:var(--muted);font-size:12px;font-weight:700}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}label{display:grid;gap:7px;font-size:13px;font-weight:900}input,textarea{width:100%;border:1px solid #cfd8e6;border-radius:8px;padding:12px;font:inherit}textarea{min-height:100px;resize:vertical}.hint{font-size:12px;color:var(--muted);font-weight:700}
    .preview{display:grid;grid-template-columns:220px 1fr;gap:14px;border:1px solid var(--line);border-radius:8px;padding:12px;background:#fafcff}.thumb{aspect-ratio:16/10;background:#e9eef6 center/cover no-repeat;border:1px solid var(--line);border-radius:6px}
    .actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    @media(max-width:860px){main{grid-template-columns:1fr}.grid,.preview{grid-template-columns:1fr}.top{display:block}.toolbar{margin-top:12px}}
  </style>
</head>
<body>
  <header>
    <div class="top">
      <div><h1>블로그 수정</h1><p class="sub">메인 화면의 최신 기술자료 카드 이미지와 네이버 블로그 링크를 수정합니다.</p></div>
      <div class="toolbar"><a class="btn" href="index.html">관리자 홈</a><button class="btn primary" id="pickRootBtn" type="button">홈페이지 폴더 선택</button></div>
    </div>
  </header>
  <main>
    <aside class="panel">
      <div class="head">기술자료 카드</div>
      <div class="body">
        <div id="status" class="status">먼저 홈페이지 루트 폴더를 선택하세요.</div>
        <div class="list" id="blogList"></div>
      </div>
    </aside>
    <section class="panel">
      <div class="head" id="editorTitle">블로그 카드 수정</div>
      <div class="body">
        <div class="grid">
          <label>분야
            <input id="category" placeholder="기계설계">
          </label>
          <label>제목
            <input id="title" placeholder="기계설계 기술자료">
          </label>
        </div>
        <label>설명
          <textarea id="description" placeholder="카드에 표시될 설명"></textarea>
        </label>
        <label>블로그 링크
          <input id="url" type="url" placeholder="https://blog.naver.com/...">
        </label>
        <div class="grid">
          <label>현재 이미지 경로
            <input id="image" placeholder="assets/service-design.jpg">
          </label>
          <label>새 이미지 업로드
            <input id="imageFile" type="file" accept="image/*">
            <span class="hint">선택 시 `assets/blog/` 아래로 복사하고 JSON 경로를 자동 변경합니다.</span>
          </label>
        </div>
        <div class="preview">
          <div class="thumb" id="preview"></div>
          <div>
            <div class="hint">저장 대상</div>
            <div id="pathText">data/blog-posts.json</div>
            <p class="hint">이미지는 16:9 또는 4:3, 가로 800px 이상 권장입니다.</p>
          </div>
        </div>
        <div class="actions">
          <button class="btn green" id="saveBtn" type="button" disabled>블로그 카드 저장</button>
          <span class="hint">저장 전 <code>blog-posts.backup-날짜.json</code> 파일을 1회 생성합니다.</span>
        </div>
      </div>
    </section>
  </main>
  <script src="admin-shared.js"></script>
  <script>
    const $ = (id) => document.getElementById(id);
    const state = { rootHandle: null, posts: [], selectedIndex: 0, backupMade: false, imageFile: null };
    function setStatus(message, type = "") { const el = $("status"); el.className = `status ${type}`.trim(); el.textContent = message; }
    function escapeHtml(value) { return String(value || "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;"); }
    function slugify(value) { return String(value || "").trim().toLowerCase().replace(/[^a-z0-9가-힣_-]+/g,"-").replace(/-+/g,"-").replace(/^-|-$/g,""); }
    function extensionOf(name) { return String(name).toLowerCase().match(/\.[a-z0-9]+$/)?.[0] || ".jpg"; }
    async function getDir(parent, name, create = false) { return parent.getDirectoryHandle(name, { create }); }
    async function getFile(parent, name, create = false) { return parent.getFileHandle(name, { create }); }
    async function readText(path) { let dir = state.rootHandle; const parts = path.split("/"); for (const part of parts.slice(0,-1)) dir = await getDir(dir, part); return await (await (await getFile(dir, parts.at(-1))).getFile()).text(); }
    async function writeBlob(path, blob) { let dir = state.rootHandle; const parts = path.split("/"); for (const part of parts.slice(0,-1)) dir = await getDir(dir, part, true); const h = await getFile(dir, parts.at(-1), true); const w = await h.createWritable(); await w.write(blob); await w.close(); }
    async function backupOnce() { if (state.backupMade) return; const stamp = new Date().toISOString().replace(/[-:]/g,"").replace(/\..+/,"").replace("T","-"); await writeBlob(`data/blog-posts.backup-${stamp}.json`, new Blob([JSON.stringify(state.posts, null, 2)], { type: "application/json;charset=utf-8" })); state.backupMade = true; }
    async function loadPosts() { state.posts = JSON.parse(await readText("data/blog-posts.json")); state.selectedIndex = 0; state.backupMade = false; renderList(); fillForm(); setStatus(`불러오기 완료: ${state.posts.length}개 카드`, "good"); }
    function renderList() {
      $("blogList").innerHTML = state.posts.map((post, index) => `<button class="item ${index === state.selectedIndex ? "active" : ""}" type="button" data-index="${index}">${escapeHtml(post.category)}<span class="meta">${escapeHtml(post.title)}</span></button>`).join("");
      document.querySelectorAll("[data-index]").forEach((btn) => btn.addEventListener("click", () => { state.selectedIndex = Number(btn.dataset.index); state.imageFile = null; $("imageFile").value = ""; renderList(); fillForm(); }));
    }
    function fillForm() {
      const post = state.posts[state.selectedIndex] || {};
      $("editorTitle").textContent = `${post.category || "블로그"} 카드 수정`;
      $("category").value = post.category || "";
      $("title").value = post.title || "";
      $("description").value = post.description || "";
      $("url").value = post.url || "";
      $("image").value = post.image || "";
      $("preview").style.backgroundImage = post.image ? `url("../${post.image}")` : "";
      $("pathText").textContent = post.image || "data/blog-posts.json";
    }
    async function save() {
      await backupOnce();
      const post = {
        category: $("category").value.trim(),
        title: $("title").value.trim(),
        description: $("description").value.trim(),
        url: $("url").value.trim(),
        image: $("image").value.trim()
      };
      if (state.imageFile) {
        const fileName = `${slugify(post.category || post.title || "blog")}${extensionOf(state.imageFile.name)}`;
        post.image = `assets/blog/${fileName}`;
        await writeBlob(post.image, state.imageFile);
      }
      state.posts[state.selectedIndex] = post;
      await writeBlob("data/blog-posts.json", new Blob([JSON.stringify(state.posts, null, 2) + "\n"], { type: "application/json;charset=utf-8" }));
      state.imageFile = null;
      $("imageFile").value = "";
      renderList();
      fillForm();
      setStatus("블로그 카드 저장 완료. GitHub에 올리면 Vercel에 반영됩니다.", "good");
    }
    async function useRootHandle(handle, shared = false) {
      state.rootHandle = handle;
      $("saveBtn").disabled = false;
      await loadPosts();
      if (shared) setStatus(`공유된 폴더를 불러왔습니다: ${handle.name}`, "good");
    }
    $("pickRootBtn").addEventListener("click", async () => {
      try {
        await useRootHandle(await QdmAdminStorage.pickAndSaveRoot());
      } catch (error) { setStatus(error.message, "bad"); }
    });
    $("imageFile").addEventListener("change", () => {
      state.imageFile = $("imageFile").files[0] || null;
      if (state.imageFile) {
        $("preview").style.backgroundImage = `url("${URL.createObjectURL(state.imageFile)}")`;
        $("pathText").textContent = `assets/blog/${slugify($("category").value || $("title").value || "blog")}${extensionOf(state.imageFile.name)}`;
      }
    });
    $("saveBtn").addEventListener("click", () => save().catch((error) => setStatus(error.message, "bad")));
    QdmAdminStorage.loadSavedRoot().then((handle) => {
      if (handle) return useRootHandle(handle, true);
    }).catch(() => {});
  </script>
</body>
</html>
